<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potuslandia</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

    <nav>

        <div class="logo">
            ⚓ Potuslandia
        </div>

        <ul class="menu" id="menuPrincipal">

            <li>
                <a href="#" onclick="inicio(); return false;">
                    Inicio
                </a>
            </li>

            <li>
                <a href="#" onclick="archivos(); return false;">
                    Archivos
                </a>
            </li>

            <li>
                <a href="#" onclick="comunidad(); return false;">
                    Comunidad
                </a>
            </li>

        </ul>

        <!-- PERFIL USUARIO -->

        <div id="menuUsuario">

            <div id="perfilBtn" onclick="toggleMenu()">

                <img
                    id="fotoUsuario"
                    src=""
                    alt="Usuario"
                >

                <span id="nombreUsuario"></span>

                <span id="flechaMenu">
                    ▼
                </span>

            </div>

            <div id="menuDesplegable">

                <div
                    class="menuItem"
                    id="adminBtn"
                    onclick="panelAdmin()"
                >
                    ⚙️ Panel Admin
                </div>

                <div
                    class="menuItem"
                    onclick="misFavoritos()"
                >
                    🌟 Favoritos
                </div>

                <div class="menuItem">
                    👤 Mi perfil
                </div>

                <hr>

                <div
                    class="menuItem salir"
                    onclick="cerrarSesion()"
                >
                    🚪 Cerrar sesión
                </div>

            </div>

        </div>

    </nav>

    <div id="fondo"></div>

    <div id="contenido"></div>

    <!-- BOTÓN CAMBIAR FONDO SIEMPRE VISIBLE -->

    <button
        id="botonFondo"
        class="btnFondo"
        onclick="cambiarFondoAleatorio()"
    >
        🌌
    </button>

    <script src="data/recursos.js"></script>
    <script src="script.js"></script>

</body>

</html>
